services:
  postgres:
    image: postgres:16-alpine
    container_name: lvo-crm-db
    environment:
      POSTGRES_DB: lvo_crm
      POSTGRES_USER: lvo
      POSTGRES_PASSWORD: lvo_dev_change_me
    ports:
      # Host 5433 avoids conflict with a local PostgreSQL service on 5432
      - "5433:5432"
    volumes:
      - lvo_pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: lvo-crm-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: lvo_minio
      MINIO_ROOT_PASSWORD: lvo_minio_dev_change_me
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - lvo_minio:/data

volumes:
  lvo_pgdata:
  lvo_minio:
